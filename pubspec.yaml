name: instally
description: Track clicks, installs, and revenue from every link. Lightweight install tracking for Flutter apps.
version: 1.0.0
homepage: https://instally.io
repository: https://github.com/Instally-io/instally-flutter-sdk

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
